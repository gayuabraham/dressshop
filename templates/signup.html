<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DressHub - Sign Up</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-100 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-5xl bg-white rounded-3xl shadow-2xl overflow-hidden grid lg:grid-cols-2">

        <!-- Left Side -->
        <div class="hidden lg:flex flex-col justify-center bg-indigo-600 text-white p-12">

            <h1 class="text-5xl font-bold mb-6">
                DressHub
            </h1>

            <h2 class="text-3xl font-semibold mb-4">
                Create Your Account
            </h2>

            <p class="text-indigo-100 leading-8 text-lg">
                Join DressHub and discover premium fashion collections,
                exclusive discounts, personalized recommendations, and
                a seamless shopping experience.
            </p>

            <div class="mt-12">
                <img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png"
                     class="w-72 mx-auto"
                     alt="Shopping">
            </div>

        </div>

        <!-- Right Side -->
        <div class="p-8 md:p-12">

            <h2 class="text-3xl font-bold text-gray-800 mb-2">
                Sign Up
            </h2>

            <p class="text-gray-500 mb-8">
                Create your account to get started.
            </p>

            <form action="signup_function" method="POST" class="space-y-5">
                {% csrf_token %}

                <!-- Name -->
                <div class="grid md:grid-cols-2 gap-5">

                    <div>
                        <label class="block mb-2 text-gray-700 font-medium">
                            First Name
                        </label>

                        <input
                            type="text"
                            name="first_name"
                            placeholder="John"
                
                            class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                    </div>

                    <div>
                        <label class="block mb-2 text-gray-700 font-medium">
                            Last Name
                        </label>

                        <input
                            type="text"
                            name="last_name"
                            placeholder="Doe"
                            class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                    </div>

                </div>

                <!-- Username -->
                <div>

                    <label class="block mb-2 text-gray-700 font-medium">
                        Username
                    </label>

                    <div class="relative">

                        <span class="absolute left-4 top-3.5 text-gray-400">
                            <i class="fa-solid fa-user"></i>
                        </span>

                        <input
                            type="text"
                            name="username"
                            placeholder="Choose a username"
                            class="w-full pl-12 border rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">

                    </div>

                </div>

                <!-- Email -->
                <div>

                    <label class="block mb-2 text-gray-700 font-medium">
                        Email Address
                    </label>

                    <div class="relative">

                        <span class="absolute left-4 top-3.5 text-gray-400">
                            <i class="fa-solid fa-envelope"></i>
                        </span>

                        <input
                            type="email"
                            name="email"
                            placeholder="example@email.com"
                            class="w-full pl-12 border rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">

                    </div>

                </div>

                <!-- Password -->
                <div>

                    <label class="block mb-2 text-gray-700 font-medium">
                        Password
                    </label>

                    <div class="relative">

                        <span class="absolute left-4 top-3.5 text-gray-400">
                            <i class="fa-solid fa-lock"></i>
                        </span>

                        <input
                            type="password"
                            name="password"
                            placeholder="Enter password"
                            class="w-full pl-12 border rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">

                    </div>

                </div>

                <!-- Confirm Password -->
                <div>

                    <label class="block mb-2 text-gray-700 font-medium">
                        Confirm Password
                    </label>

                    <div class="relative">

                        <span class="absolute left-4 top-3.5 text-gray-400">
                            <i class="fa-solid fa-lock"></i>
                        </span>

                        <input
                            type="password"
                            name="confirm_password"
                            placeholder="Confirm password"
                            class="w-full pl-12 border rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">

                    </div>

                </div>

                <!-- Terms -->
                <div class="flex items-center">

                    <input
                        type="checkbox"
                        id="terms"
                        class="w-4 h-4 text-indigo-600 rounded">

                    <label for="terms" class="ml-3 text-gray-600 text-sm">
                        I agree to the
                        <a href="#" class="text-indigo-600 hover:underline">
                            Terms & Conditions
                        </a>
                    </label>

                </div>

                <!-- Button -->
                <button
                    type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-semibold transition duration-300">

                    Create Account

                </button>

                <!-- Login -->
                <p class="text-center text-gray-600">

                    Already have an account?

                    <a href="#" class="text-indigo-600 font-semibold hover:underline">
                        Login
                    </a>

                </p>

            </form>

        </div>

    </div>

</body>
</html>
