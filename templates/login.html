<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DressHub | Login</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-100 min-h-screen flex items-center justify-center px-4 py-10">

    <div class="w-full max-w-5xl bg-white rounded-3xl shadow-2xl overflow-hidden grid lg:grid-cols-2">

        <!-- Left Section -->
        <div class="hidden lg:flex flex-col justify-center items-center bg-indigo-600 text-white p-12">

            <i class="fa-solid fa-shirt text-7xl mb-6"></i>

            <h1 class="text-5xl font-bold mb-4">
                DressHub
            </h1>

            <p class="text-lg text-center leading-8 text-indigo-100">
                Welcome back! Sign in to continue shopping,
                manage your orders, wishlist, and discover
                the latest fashion collections.
            </p>

        </div>

        <!-- Right Section -->
        <div class="p-8 md:p-12">

            <div class="mb-8">
                <h2 class="text-4xl font-bold text-gray-800">
                    Welcome Back 👋
                </h2>

                <p class="text-gray-500 mt-2">
                    Login to your DressHub account.
                </p>
            </div>

            <form action="#" method="POST" class="space-y-6">

                <!-- Email -->
                <div>
                    <label class="block mb-2 font-medium text-gray-700">
                        Email Address
                    </label>

                    <div class="relative">
                        <span class="absolute left-4 top-3.5 text-gray-400">
                            <i class="fa-solid fa-envelope"></i>
                        </span>

                        <input
                            type="email"
                            name="email"
                            placeholder="Enter your email"
                            required
                            class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <div class="flex justify-between mb-2">
                        <label class="font-medium text-gray-700">
                            Password
                        </label>

                        <a href="#" class="text-sm text-indigo-600 hover:underline">
                            Forgot Password?
                        </a>
                    </div>

                    <div class="relative">
                        <span class="absolute left-4 top-3.5 text-gray-400">
                            <i class="fa-solid fa-lock"></i>
                        </span>

                        <input
                            type="password"
                            name="password"
                            placeholder="Enter your password"
                            required
                            class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="flex items-center justify-between">

                    <label class="flex items-center text-gray-600">
                        <input
                            type="checkbox"
                            class="mr-2 rounded text-indigo-600">

                        Remember Me
                    </label>

                </div>

                <!-- Login Button -->
                <button
                    type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-semibold text-lg transition duration-300">

                    Login

                </button>

                <!-- Divider -->
                <div class="flex items-center">
                    <div class="flex-grow border-t"></div>
                    <span class="mx-4 text-gray-400 text-sm">OR</span>
                    <div class="flex-grow border-t"></div>
                </div>

                <!-- Google Login -->
                <button
                    type="button"
                    class="w-full border border-gray-300 py-3 rounded-xl flex items-center justify-center gap-3 hover:bg-gray-50 transition">

                    <i class="fa-brands fa-google text-red-500"></i>

                    Continue with Google

                </button>

                <!-- Signup -->
                <p class="text-center text-gray-600">

                    Don't have an account?

                    <a href="#" class="text-indigo-600 font-semibold hover:underline">
                        Create Account
                    </a>

                </p>

            </form>

        </div>

    </div>

</body>
</html>
