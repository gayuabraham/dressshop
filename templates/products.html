
{% extends 'index.html' %} 
{% block products %}
    

    
<section class="bg-gray-100 py-16">

    <div class="max-w-7xl mx-auto px-6">

        <h2 class="text-4xl font-bold text-center mb-12">
            Featured Collection
        </h2>

        <div class="grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">

            <!-- Product Card -->
            
            {% for i in products %}
                
            
            <div class="bg-white rounded-2xl overflow-hidden shadow-md hover:shadow-xl transition group">
                
                <div class="relative overflow-hidden">
                    
                    

                  <img src="{{ i.dress_image }}" width="200">
                    
                    <span class="absolute top-3 left-3 bg-pink-600 text-white text-xs px-3 py-1 rounded-full">
                        New
                    </span>
                    
                    <button
                    class="absolute top-3 right-3 bg-white p-2 rounded-full shadow hover:bg-pink-600 hover:text-white">
                    ❤️
                </button>
                
            </div>
            
            <div class="p-5">
                
                <p class="text-sm text-gray-500">
                    Women's Fashion
                </p>
                
                <h3 class="font-semibold text-lg mt-1">
                    {{i.dress_name}}
                </h3>
                
                <div class="flex items-center mt-2 text-yellow-400">
                    ★★★★☆
                </div>
                
                <div class="flex items-center mt-3">
                    <span class="text-xl font-bold text-pink-600">
                        ₹{{i.dress_price}}
                    </span>
                    
                    <span class="ml-3 text-gray-400 line-through">
                        ₹1999
                    </span>
                </div>
                
                <button
                class="w-full mt-5 bg-gray-900 text-white py-3 rounded-lg hover:bg-pink-600 transition">
                Add to Cart
            </button>
            {% endfor %}

                </div>

            </div>

            <!-- Duplicate this card for more products -->

        </div>

    </div>

</section>
{% endblock products %}
